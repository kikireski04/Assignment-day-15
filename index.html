<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kopi Kenangan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="container navbar">
    <h1>Kopi Kenangan</h1>

    <nav>
      <a href="#">Home</a>
      <a href="#">Menu</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </div>
</header>

<section class="hero">

  <div class="container hero-content">

    <div class="hero-text">
      <h2>Nikmati Kopi Favoritmu</h2>

      <p>
        Temukan berbagai menu coffee dan non coffee
        dengan rasa terbaik setiap hari.
      </p>

      <button>Order Now</button>
    </div>

    <div class="hero-image">
      <img src="assets/hero.png" alt="Kopi Kenangan">
    </div>

  </div>

</section>

<section class="menu">

  <div class="container">

    <h2 class="title">Popular Menu</h2>

    <div class="menu-list">

      <div class="card">

        <img src="assets/coffee.png" alt="Coffee">

        <h3>Coffee</h3>

        <p>
          Pilihan kopi favorit dengan rasa khas.
        </p>

        <button>Buy</button>

      </div>

      <div class="card">

        <img src="assets/noncoffee.png" alt="Non Coffee">

        <h3>Non Coffee</h3>

        <p>
          Minuman segar tanpa kopi untuk semua kalangan.
        </p>

        <button>Buy</button>

      </div>

    </div>

  </div>

</section>

<footer>
  <p>© 2026 Kopi Kenangan</p>
</footer>

</body>
</html>
